<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>视频播放</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* 全屏视频优先 */
    .player-wrap {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    video {
      width: 100%;
      max-height: 100vh;
      outline: none;
      display: block;
    }

    /* 错误页 */
    .error-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #fff;
      text-align: center;
      padding: 24px;
    }

    .error-wrap.show { display: flex; }

    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    .error-desc { font-size: 14px; color: #888; }

    /* 加载中 */
    .loading-wrap {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.3s;
    }

    .loading-wrap.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { color: #888; font-size: 14px; }
  </style>
</head>
<body>

  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <div class="loading-text">视频加载中...</div>
  </div>

  <div class="player-wrap" id="playerWrap">
    <video
      id="videoPlayer"
      controls
      playsinline
      webkit-playsinline
      preload="metadata"
      x5-video-player-type="h5"
      x5-video-player-fullscreen="true"
    ></video>
  </div>

  <div class="error-wrap" id="errorWrap">
    <div class="error-icon">⚠️</div>
    <div class="error-title" id="errorTitle">无法播放视频</div>
    <div class="error-desc" id="errorDesc">链接无效或视频已被删除</div>
  </div>

  <script>
    const loadingWrap = document.getElementById('loadingWrap');
    const errorWrap = document.getElementById('errorWrap');
    const videoPlayer = document.getElementById('videoPlayer');
    const errorTitle = document.getElementById('errorTitle');
    const errorDesc = document.getElementById('errorDesc');

    function showError(title, desc) {
      loadingWrap.classList.add('hidden');
      errorWrap.classList.add('show');
      errorTitle.textContent = title;
      errorDesc.textContent = desc || '';
    }

    // 从 URL 参数中读取视频地址
    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get('v');

    if (!videoUrl) {
      showError('没有视频链接', '请通过正确的二维码扫码访问');
    } else {
      videoPlayer.src = videoUrl;

      videoPlayer.addEventListener('loadedmetadata', () => {
        loadingWrap.classList.add('hidden');
      });

      videoPlayer.addEventListener('error', () => {
        showError('视频加载失败', '视频文件可能不存在或格式不受支持');
      });

      // 超时保护：10秒还没加载出来就提示
      const loadTimeout = setTimeout(() => {
        if (videoPlayer.readyState < 1) {
          showError('加载超时', '请检查网络连接后重试');
        }
      }, 10000);

      videoPlayer.addEventListener('loadedmetadata', () => clearTimeout(loadTimeout));

      // 自动播放（移动端通常需要用户手势，但先尝试）
      videoPlayer.play().catch(() => {
        // 静音后再尝试（iOS/Android 静音可自动播放）
        // 不强制，让用户点击播放按钮即可
      });
    }
  </script>
</body>
</html>
